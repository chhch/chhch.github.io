services:
  jekyll:
    image: jekyll/builder:pages
    command: sh -lc "gem install webrick && jekyll serve --drafts --livereload"
    volumes:
      - type: bind
        source: .
        target: /srv/jekyll
    ports:
      - published: 4000
        target: 4000
      - published: 35729
        target: 35729