services:
  jekyll:
    image: jekyll/builder:pages
    command: sh -lc "bundle install && bundle exec jekyll serve --drafts --livereload --host 0.0.0.0"
    volumes:
      - type: bind
        source: .
        target: /srv/jekyll
    ports:
      - published: 4000
        target: 4000
      - published: 35729
        target: 35729